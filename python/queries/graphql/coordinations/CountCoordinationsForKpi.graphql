query CoordinationsKpi(
  $first: Int
  $after: String
  $where: QueryCoordinationsWhereWhereConditions
  $whereHas: [CoordinationsWhereHasInput!]
) {
  coordinations(
    first: $first
    after: $after
    where: $where
    whereHas: $whereHas
  ) {
    pageInfo {
      currentPage
      total
      hasNextPage
      endCursor
    }
    edges {
      node {
        id
      }
    }
  }
}
