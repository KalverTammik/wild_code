mutation UpdateEasement($input: UpdateEasementInput!) {
  updateEasement(input: $input) {
    __typename
    id
    properties {
      edges {
        area {
          size
          unit
        }
        isPayable
        pricePerAreaUnit {
          amount
          currencyCode
        }
        totalPrice {
          amount
          currencyCode
        }
        nextPaymentDate
        node {
          id
          displayAddress
          cadastralUnitNumber
        }
      }
    }
  }
}
