query ProjectsKpi(
  $first: Int
  $after: String
  $where: QueryProjectsWhereWhereConditions
  $whereHas: [ProjectsWhereHasInput!]
) {
  projects(
    first: $first
    after: $after
    where: $where
    whereHas: $whereHas
    trashed: WITHOUT
  ) {
    pageInfo {
      currentPage
      total
      hasNextPage
      endCursor
    }
    edges {
      node {
        id
      }
    }
  }
}
