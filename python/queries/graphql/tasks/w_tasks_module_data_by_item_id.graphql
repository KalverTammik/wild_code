query task(
  $id: ID!
  $propertiesFirst: Int = 1
  $propertiesAfter: String
) {
  task(id: $id) {
    __typename
    id
    name: title
    startAt
    dueAt
    createdAt
    updatedAt
    members {
      edges {
        node {
          id
          displayName
          deletedAt
        }
        isResponsible
      }
    }
    status {
      id
      name
      color
      type
    }
    type {
      id
      name
    }
    properties(first: $propertiesFirst, after: $propertiesAfter) {
      pageInfo {
        count
        currentPage
        startCursor
        endCursor
        hasNextPage
        hasPreviousPage
        lastPage
        total
      }
      edges {
        node {
          id
          cadastralUnitNumber
        }
      }
    }
    priority
    description
  }
}
