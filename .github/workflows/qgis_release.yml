name: Release QGIS Plugin

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_version:
        description: Version to package for manual test run (e.g. 2.0.6)
        required: true
      release_tag:
        description: Optional tag override for manual runs (e.g. v2.0.6)
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install qgis-plugin-ci
        run: python -m pip install --upgrade pip qgis-plugin-ci

      - name: Resolve release values
        id: release_values
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            RELEASE_VERSION="${RELEASE_TAG#v}"
          else
            RELEASE_VERSION="${{ inputs.release_version }}"
            if [ -n "${{ inputs.release_tag }}" ]; then
              RELEASE_TAG="${{ inputs.release_tag }}"
            else
              RELEASE_TAG="v${RELEASE_VERSION}"
            fi
          fi

          RELEASE_VERSION="${RELEASE_VERSION#.}"

          if [[ "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            RELEASE_VERSION="${RELEASE_VERSION}.0"
          elif [[ "${RELEASE_VERSION}" =~ ^[0-9]+$ ]]; then
            RELEASE_VERSION="${RELEASE_VERSION}.0.0"
          fi

          if ! [[ "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid release version '${RELEASE_VERSION}'. Use x.y.z (or vX.Y.Z as tag)."
            exit 1
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare live plugin directory
        shell: bash
        run: |
          rm -rf kavitro_live
          mkdir -p kavitro_live

          rsync -a ./ kavitro_live/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'kavitro_live/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.venv/' \
            --exclude '.pytest_cache/' \
            --exclude 'config/config_dev.json' \
            --exclude 'metadata.dev.txt'

          python - <<'PY'
          from pathlib import Path

          metadata_path = Path("kavitro_live/metadata.txt")
          release_version = "${{ steps.release_values.outputs.release_version }}".strip()
          text = metadata_path.read_text(encoding="utf-8")
          lines = text.splitlines()

          out = []
          for line in lines:
              if line.startswith("name="):
                  value = line.split("=", 1)[1]
                  value = value.replace(" [DEV]", "").replace("[DEV]", "").strip()
                  out.append(f"name={value}")
                  continue
              if line.startswith("experimental="):
                  out.append("experimental=False")
                  continue
              if line.startswith("version="):
                  out.append(f"version={release_version}")
                  continue
              out.append(line)

          metadata_path.write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

          cat > .qgis-plugin-ci << 'EOF'
          plugin_path: kavitro_live
          github_organization_slug: KalverTammik
          project_slug: wild_code
          EOF

      - name: Stage generated release files
        run: |
          git add -A kavitro_live .qgis-plugin-ci

      - name: Ensure GitHub release exists (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.release_values.outputs.release_tag }}"
          gh release view "${TAG}" >/dev/null 2>&1 || gh release create "${TAG}" --target "${GITHUB_SHA}" --title "${TAG}" --notes "Manual release ${TAG}"

      - name: Deploy plugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          qgis-plugin-ci release "${{ steps.release_values.outputs.release_version }}" \
            --release-tag "${{ steps.release_values.outputs.release_tag }}" \
            --github-token "${GITHUB_TOKEN}" \
            --create-plugin-repo \
            --allow-uncommitted-changes

      - name: Build changelog-aware repository assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TITLE: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          TAG="${{ steps.release_values.outputs.release_tag }}"
          NOTES_FILE="release_notes.md"

          # Always have a visible changelog header in QGIS Plugin Manager.
          if [ -z "${RELEASE_TITLE}" ]; then
            RELEASE_TITLE="${TAG}"
          fi

          # For manual dispatch, fetch release title/body from GitHub API when available.
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            API_PATH="repos/${{ github.repository }}/releases/tags/${TAG}"
            API_TITLE="$(gh api "${API_PATH}" --jq '.name // .tag_name' 2>/dev/null || true)"
            API_BODY="$(gh api "${API_PATH}" --jq '.body // ""' 2>/dev/null || true)"
            if [ -n "${API_TITLE}" ]; then
              RELEASE_TITLE="${API_TITLE}"
            fi
            if [ -n "${API_BODY}" ]; then
              RELEASE_BODY="${API_BODY}"
            fi
          fi

          if [ -n "${RELEASE_BODY}" ]; then
            printf '%s\n' "${RELEASE_BODY}" > "${NOTES_FILE}"
          fi

          CMD=(
            python tools/qgis_repo_release.py
            --plugin-dir kavitro_live
            --out release_repo
            --base-url "https://github.com/${{ github.repository }}/releases/download/${TAG}/"
            --release-tag "${TAG}"
            --release-title "${RELEASE_TITLE}"
          )
          if [ -s "${NOTES_FILE}" ]; then
            CMD+=(--release-notes-file "${NOTES_FILE}")
          fi
          "${CMD[@]}"

      - name: Validate changelog exists in plugins.xml
        shell: bash
        run: |
          if ! grep -q "<changelog>" release_repo/plugins.xml; then
            echo "ERROR: release_repo/plugins.xml is missing <changelog>."
            cat release_repo/plugins.xml
            exit 1
          fi

      - name: Upload repository assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.release_values.outputs.release_tag }}"
          gh release upload "${TAG}" \
            release_repo/plugins.xml \
            release_repo/*.zip \
            release_repo/*.png \
            --clobber

      - name: Mark release as latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.release_values.outputs.release_tag }}"
          RELEASE_ID="$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.id')"

          gh api \
            --method PATCH \
            "repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            -F make_latest=true \
            -F prerelease=false
